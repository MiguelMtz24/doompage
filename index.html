<!DOCTYPE html>
<html lang="es">
<head>


	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Colectivo Techno</title>
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;400&display=swap" rel="stylesheet">
	<style>
		body {
			margin: 0;
			font-family: 'Montserrat', Arial, sans-serif;
			background: #111;
			color: #f5f5f5;
		}
		header {
			background: #181818;
			padding: 2rem 0 1rem 0;
			text-align: center;
			letter-spacing: 2px;
		}
		nav {
			margin: 1rem 0;
		}
		nav a {
			color: #f5f5f5;
			text-decoration: none;
			margin: 0 1.5rem;
			font-weight: 700;
			transition: color 0.2s;
		}
		nav a:hover {
			color: #00ffe7;
		}
		section {
			max-width: 900px;
			margin: 2rem auto;
			padding: 2rem;
			background: #181818;
			border-radius: 16px;
			box-shadow: 0 2px 16px #0008;
		}
		h2 {
			color: #00ffe7;
			margin-top: 0;
		}
		.gallery {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
			gap: 1rem;
		}
		.gallery img {
			width: 100%;
			border-radius: 8px;
		}
		.lineup-list {
			display: flex;
			flex-wrap: wrap;
			gap: 1rem;
		}
		.dj-card {
			background: #222;
			padding: 1rem 1.5rem;
			border-radius: 8px;
			cursor: pointer;
			transition: background 0.2s;
		}
		.dj-card:hover {
			background: #00ffe7;
			color: #181818;
		}
		.socials a {
			margin: 0 0.5rem;
			color: #00ffe7;
			font-size: 2rem;
			text-decoration: none;
		}
		.tickets-btn {
			display: inline-block;
			background: #00ffe7;
			color: #181818;
			padding: 1rem 2rem;
			border-radius: 8px;
			font-weight: bold;
			text-decoration: none;
			margin-top: 1rem;
			transition: background 0.2s;
		}
		.tickets-btn:hover {
			background: #00bfae;
		}

        .lineup-list {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .dj-card {
        width: 280px;
        height:280px;
        overflow: hidden;
        border-radius: 8px;
        background: black;
        }

        .dj-card img,
        .dj-card video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.7) contrast(1.2);
        }

	</style>
</head>
<body>

	   <header style="padding-bottom: 0; background: linear-gradient(90deg, #181818 0%, #000000 50%, #181818 100%); box-shadow: 0 4px 32px #00ffe733; position: relative; min-height: 260px;">

		   </div>
		   <nav>
			   <a href="#eventos">Eventos</a>

			   <a href="#tickets">Tickets</a>
               <a href="Merch">Merch</a>
		   </nav>
	   </header>
